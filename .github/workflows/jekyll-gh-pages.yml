name: SEO & Blog Automation

on:
  # 1. ירוץ כשאתה מעלה קבצים ידנית
  push:
    branches: [ main ]
    paths:
      - '**/*.html'
      - 'favicon.svg'
      - 'build-blog.js'
      
  # 2. שעון מעורר: ירוץ כל יום ב-00:00 בלילה UTC (2:00 בלילה שעון ישראל)
  schedule:
    - cron: '0 0 * * *'

  # 3. אפשרות להרצה ידנית
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # התקנת סביבת עבודה לסקריפט הבלוג שלנו
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # הרצת הסקריפט שיוצר את ה- posts.json
      - name: Generate Blog JSON
        run: node build-blog.js

      # יצירת מפת אתר לגוגל
      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://globalcalcpro.com/
          drop-html-extension: false
          exclude-file: "['privacy.html', 'terms.html']"

      # יצירת קובץ robots.txt
      - name: Create Optimized Robots.txt
        run: |
          cat <<EOF > robots.txt
          User-agent: *
          Allow: /
          Disallow: /.git/
          Disallow: /.github/
          Disallow: /templates/
          Sitemap: https://globalcalcpro.com/sitemap.xml
          EOF

      # שמירת כל הקבצים שנוצרו בחזרה למאגר
      - name: Commit and Push Updates
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add sitemap.xml robots.txt posts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-build: Sitemap, Robots & Blog Data" && git push)
