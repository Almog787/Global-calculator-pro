# שם קובץ הפריסה
name: Build and Deploy Jekyll Site

on:
  # 1. ירוץ בכל פעם שאתה מעלה קוד חדש לענף הראשי
  push:
    branches: ["main"]
  
  # 2. שעון מעורר: יבנה את האתר אוטומטית בכל יום בחצות UTC (שזה 02:00 בלילה שעון ישראל)
  # זה יגרום למאמרים עם תאריך של אותו יום להופיע באתר לבד!
  schedule:
    - cron: '0 0 * * *'

  # 3. מאפשר לך להריץ את הבנייה ידנית בלחיצת כפתור ב-GitHub
  workflow_dispatch:

# הגדרת הרשאות חיוניות לפריסה ב-GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# מונע כפילות של הרצות בנייה ומבטל ריצות ישנות אם יש אחת חדשה בתור
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # שלב הבנייה (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # מושך היסטוריה מלאה עבור תאריכי עדכון מדויקים ב-SEO

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # ------------------------------------------------------------------
      #       התיקון הקריטי נמצא כאן!
      # אנחנו אומרים לאקשן להעלות רק את תיקיית האתר המוגמר (_site)
      # ------------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  # שלב הפריסה (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
