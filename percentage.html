---
layout: default
title: "Percentage Calculator"
description: "Calculate percentages instantly. Find discounts and markups."
---
<main class="pt-12 pb-20 px-6 max-w-7xl mx-auto flex-grow w-full">
    <div class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-bold font-headline mb-4">Percentage Calculator</h1>
        <p class="text-slate-500">Fast tool for everyday math.</p>
    </div>

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl shadow-blue-900/5 overflow-hidden border border-slate-100 p-8 md:p-12 mb-16">
        <div class="grid md:grid-cols-2 gap-10">
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">What is (%)</label>
                    <input id="perc-val" type="number" placeholder="e.g. 15" class="w-full bg-slate-50 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-primary/20">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Of Total Amount</label>
                    <input id="perc-total" type="number" placeholder="e.g. 500" class="w-full bg-slate-50 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-primary/20">
                </div>
                <button onclick="calcPercent()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg shadow-primary/30">Calculate</button>
            </div>
            <div class="bg-slate-50 rounded-2xl p-8 flex flex-col justify-center items-center text-center border border-slate-100">
                <span class="text-sm font-bold text-slate-400 uppercase mb-2">Result</span>
                <div id="res-percent-val" class="text-5xl font-headline font-bold text-primary">0.00</div>
            </div>
        </div>
    </div>
</main>
<script>
    function calcPercent() {
        const v = parseFloat(document.getElementById('perc-val').value);
        const t = parseFloat(document.getElementById('perc-total').value);
        if(isNaN(v) || isNaN(t)) return;
        const result = (v / 100) * t;
        document.getElementById('res-percent-val').innerText = result % 1 === 0 ? result.toLocaleString() : result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        gtag('event', 'calculate', { 'event_category': 'Engagement', 'event_label': 'Percentage' });
    }
</script>
